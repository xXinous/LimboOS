<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>LimboOS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    </noscript>
  </head>
  <body>
    <div id="root">
      <style>
        #initial-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #131313; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .r-spin-wrap { position: relative; display: flex; align-items: center; justify-content: center; width: 64px; height: 64px; }
        .r-spin-bg { position: absolute; inset: 0; border: 4px solid #393939; border-radius: 50%; }
        .r-spin-track { position: absolute; inset: -4px; border: 4px solid transparent; border-top-color: #FF8C00; border-radius: 50%; animation: r-spin 1s linear infinite; }
        .r-spin-dot { width: 8px; height: 8px; background: #FF8C00; border-radius: 50%; animation: r-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes r-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes r-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        .r-text { color: #FF8C00; font-family: ui-monospace, "Courier New", monospace; font-size: 14px; letter-spacing: 0.3em; margin-top: 24px; text-transform: uppercase; font-weight: bold; animation: r-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      </style>
      <div id="initial-loader">
        <div class="r-spin-wrap">
          <div class="r-spin-bg"><div class="r-spin-track"></div></div>
          <div class="r-spin-dot"></div>
        </div>
        <div class="r-text">INICIALIZANDO...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
  </body>
</html>
