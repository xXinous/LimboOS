<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mac OS 9 - Byte Haven</title>
    <style>
        /* Estilo Clássico Mac OS 9 (Platinum Theme) */
        body {
            background-color: #008080; /* Teal clássico do Mac OS */
            font-family: "Chicago", "Geneva", "Arial", sans-serif; /* Fontes retrô */
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: none;
        }

        /* Ícones da Área de Trabalho */
        #desktop {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 30px;
        }

        .icon {
            width: 80px;
            text-align: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
        }

        .icon-img {
            font-size: 40px;
            margin-bottom: 5px;
            text-shadow: none;
        }

        .icon:active .icon-img {
            filter: invert(1);
        }

        /* Janela Estilo Mac OS */
        .window {
            background-color: #dddddd;
            border: 1px solid #000;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            width: 600px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            color: #000;
        }

        /* Barra de Título com Pinstripes */
        .title-bar {
            height: 22px;
            background: repeating-linear-gradient(
                to bottom,
                #dddddd,
                #dddddd 1px,
                #aaaaaa 1px,
                #aaaaaa 2px
            );
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .title-text {
            background-color: #dddddd;
            padding: 0 10px;
            font-size: 14px;
            font-weight: bold;
            border-left: 1px solid #000;
            border-right: 1px solid #000;
        }

        .close-btn {
            position: absolute;
            left: 6px;
            width: 12px;
            height: 12px;
            background-color: #fff;
            border: 1px solid #000;
            box-shadow: inset 1px 1px 0 #ccc;
            cursor: pointer;
        }

        .close-btn:active {
            background-color: #000;
        }

        /* Conteúdo Interno da Janela */
        .content {
            padding: 15px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px groove #fff;
        }

        /* Botões clássicos 3D */
        .btn {
            background-color: #cccccc;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-bottom: 2px solid #555555;
            border-right: 2px solid #555555;
            padding: 4px 12px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }

        .btn:active {
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-bottom: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
            background-color: #bbbbbb;
        }

        .btn:disabled {
            color: #888;
            cursor: not-allowed;
        }

        /* Área de Preview de Texto */
        .preview-area {
            flex-grow: 1;
            background-color: #ffffff;
            border: 2px inset #888;
            padding: 10px;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            display: none;
            color: #000;
        }

        .status-text {
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }

        /* Loading Bar */
        .progress-container {
            width: 80%;
            margin: 40px auto;
            border: 2px solid #000;
            height: 20px;
            background: #fff;
            display: none;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #000;
            transition: width 0.1s linear;
        }

    </style>
</head>
<body>

    <div id="desktop">
        <div class="icon">
            <div class="icon-img">📁</div>
            <div>Macintosh HD</div>
        </div>
        <div class="icon" onclick="abrirApp()">
            <div class="icon-img">💾</div>
            <div style="background: #000; color: #fff; padding: 2px;">DiskRepair Pro</div>
        </div>
        <div class="icon">
            <div class="icon-img">🗑️</div>
            <div>Lixeira</div>
        </div>
    </div>

    <div id="app-window" class="window">
        <div class="title-bar">
            <div class="close-btn" onclick="fecharApp()"></div>
            <div class="title-text">DiskRepair Pro 4.0</div>
        </div>
        
        <div class="content">
            <div class="toolbar">
                <button class="btn" id="btn-inserir" onclick="inserirDisquete()">Inserir Disquete [A:]</button>
                <button class="btn" id="btn-reparar" onclick="iniciarReparo()" disabled>Reconstruir Setores</button>
            </div>

            <div id="status-message" class="status-text">
                Nenhum volume montado. Por favor, insira uma mídia magnética.
            </div>

            <div id="progress-container" class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <div id="preview-area" class="preview-area"></div>
        </div>
    </div>

<script>
    // Textos fornecidos
    const textoCorrompido = `S̸e̵ ̸o̸n̵d̴a̷ ̶s̵o̵n̵o̶r̶a̷ ̷a̶t̶i̵n̵g̷e̸ ̴∇̸ ̴∞̵ ̵n̷o̵ ̵m̶i̶l̶i̴s̸s̶e̵g̷u̴n̸d̸o̵ ̴d̵o̴ ̷e̶r̵r̵o̸ ̶t̴e̵m̴p̴o̶r̵a̵l̴.̶.̶.̷
O̵ ̵█̶█̶█̶█̶█̶█̶█̶█̶█̶█̶ ̷n̵ã̷o̵ ̷é̴ ̵l̵i̶n̴h̷a̴.̵ ̶É̸ ̴u̶m̸ ̷l̶o̵o̵p̸ ̷d̵e̴ ̶c̵ó̸d̵i̴g̵o̵.̶
1̷9̶0̶0̶ ̶▒̶░̶▓̶ ̶E̷R̵R̴O̷ ̸S̷I̸N̸T̸A̶X̵E̴ ̴▓̸░̸▒̸ ̶2̶0̶0̶0̵
A̶c̶h̷a̸m̴ ̴q̴u̷e̷ ̵é̶ ̵b̴u̷g̷ ̸c̷a̵l̶e̷n̸d̸á̷r̸i̴o̷.̸ ̵I̵d̴i̷o̷t̶a̵s̸.̵
L̸I̶M̵B̶O̷_̴0̶1̵ ̶é̶ ̵f̵e̵n̶d̴a̷.̸ ̶█̶█̶█̶█̶█̶█̶█̶ ̸v̵i̸v̶e̵ ̵n̷o̴ ̶e̵s̶p̵a̶ç̶o̵ ̷e̷n̸t̸r̵e̵ ̷z̶e̷r̶o̴s̸.̵
S̵e̴ ̶a̶l̴i̸m̵e̵n̴t̶a̸ ̸d̷e̴ ̴s̶i̶n̵a̵l̵.̶ ̶O̴d̴e̷i̴a̸ ̶a̷n̷a̷l̸ó̸g̵i̶c̸o̸.̸ ̷F̸i̵t̸a̸ ̸é̶ ̸â̷n̸c̶o̸r̸a̶.̶
C̷á̴l̴c̶u̵l̸o̸ ̴t̵r̶a̷n̶s̴i̷ç̸ã̶o̴:̷
(̵E̶ ̸≠ ̷h̷*̸f̴)̷ ̶/̵ █̶▓̶▒̶░̵▄̵▀̶▒̵▓̵█̶ ̵∇̵∞̶ ̵∂̷Ω̶∑̸ ̶¥̸§̷ÿ̷¢̶¿̶ ̶█̶▀̶▄̷█̴▓̷▒̷ ̸R̸E̵A̷L̷I̷D̴A̶D̵E̴ ̸O̴U̵T̶R̶A̷ ̵▒̵▓̴█̸▄̵▀̴ ̷█̴▓̷▒̷ ̵S̵Ω̸Λ̷M̷∂̴ ̸█̶█̶█̶█̶█̶█̶█̶█̶ ̶▓̴▒̸░̷ ̶A̸ ̵C̸ ̸E̷ ̸S̴ ̵S̵ ̵O̵ ̶▓̴▒̷█̴▀̸▄̵ ̶█̶▓̶▒̸ ̴S̵Ω̷Λ̸M̸∂̶ ̸░̷▄̶▀̷▒̷▓̵█̸ ̴∇̷∞̴ ̵∂̸Ω̶∑̴ ̸¥̵§̸ÿ̸¢̸¿̵ ̴█̴▀̵▄̵█̴▓̶▒̶ ̷R̷E̵A̸L̵I̷D̴A̴D̵E̴ ̵O̵U̸T̵R̶A̶ ̸▒̸▓̸█̴▄̵▀̴ ̵
S̵e̷ ̴e̷u̷ ̶s̸u̷m̷i̴r̶,̴ ̶f̴r̶e̵q̵u̶ê̵n̵c̶i̵a̶ ̵f̶u̵n̶c̸i̶o̸n̸o̷u̷.̶
M̶e̷ ̷a̵c̵h̴e̶m̷ ̴n̶o̵ ̵z̴e̴r̶o̵.̶`;

    const textoLimpo = `A Teoria das Cordas diz que existem 11 dimensões, mas todo mundo está ignorando o óbvio: o zero é a ponte.

Eu percebi que o que está acontecendo agora é uma colisão. É a minha frequência analógica (do walkman mesmo) batendo de frente com esse "reset" digital do Bug do Milênio. Se a onda sonora atingir o infinito no exato milisegundo em que o erro temporal acontecer... a gente vai ver a verdade.

O Multiverso não é uma linha reta, como ensinam na escola. É um loop de código. 1900 foi um erro de sintaxe. 2000 é o próximo.

O LIMBO_01 é a fenda que abriu. E o Malware... ele não é um vírus comum. Ele é algo que vive no espaço "entre" os zeros. Ele se alimenta de sinal, por isso ele odeia tudo o que é analógico. A fita cassete é a minha única âncora aqui.

Cálculo de transição: (E=h⋅f)/Y2K_Bug=ACESSO

Se eu sumir hoje, significa que a frequência funcionou. Não me procurem no futuro. Me achem no zero.`;

    // Elementos da UI
    const windowApp = document.getElementById('app-window');
    const btnInserir = document.getElementById('btn-inserir');
    const btnReparar = document.getElementById('btn-reparar');
    const statusMsg = document.getElementById('status-message');
    const previewArea = document.getElementById('preview-area');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');

    function abrirApp() {
        windowApp.style.display = 'block';
        resetApp();
    }

    function fecharApp() {
        windowApp.style.display = 'none';
    }

    function resetApp() {
        btnInserir.disabled = false;
        btnReparar.disabled = true;
        statusMsg.style.display = 'block';
        statusMsg.innerText = "Nenhum volume montado. Por favor, insira uma mídia magnética.";
        previewArea.style.display = 'none';
        progressContainer.style.display = 'none';
        progressBar.style.width = '0%';
    }

    function inserirDisquete() {
        btnInserir.disabled = true;
        statusMsg.innerText = "Lendo blocos do volume 'DISQUETE_NIL'...";
        
        // Simula o tempo de leitura do floppy disk
        setTimeout(() => {
            statusMsg.style.display = 'none';
            previewArea.style.display = 'block';
            previewArea.innerText = "EXPLORADOR DE ARQUIVOS - PREVIEW\nArquivo: janelas_cordas.txt (CORROMPIDO)\n------------------------------------------------\n\n" + textoCorrompido;
            btnReparar.disabled = false;
        }, 1500);
    }

    function iniciarReparo() {
        btnReparar.disabled = true;
        previewArea.style.display = 'none';
        statusMsg.style.display = 'block';
        statusMsg.innerText = "Isolando setores defeituosos... Por favor, aguarde.";
        progressContainer.style.display = 'block';

        let width = 0;
        let interval = setInterval(() => {
            // Cria pequenos "pulos" aleatórios na barra para simular o processamento antigo
            width += Math.random() * 5;
            if (width >= 100) {
                width = 100;
                clearInterval(interval);
                concluirReparo();
            }
            progressBar.style.width = width + '%';
        }, 200);
    }

    function concluirReparo() {
        setTimeout(() => {
            progressContainer.style.display = 'none';
            statusMsg.style.color = "green";
            statusMsg.innerText = "✓ DISQUETE DESCORROMPIDO. Blocos lógicos restaurados com sucesso.";
            
            previewArea.style.display = 'block';
            previewArea.innerText = "EXPLORADOR DE ARQUIVOS - PREVIEW\nArquivo: janelas_cordas.txt (RECUPERADO)\n------------------------------------------------\n\n" + textoLimpo;
        }, 500);
    }
</script>

</body>
</html>
